plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.3'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'com.google.cloud.tools.jib' version '3.5.3' // Ensure latest version for Java 25 support
	// flyway plugin is required.
	id 'org.flywaydb.flyway' version '12.1.0'
}

group = 'com.capfer'
version = '0.0.1-SNAPSHOT'
description = 'Spring Boot React Hotel Booking Application'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-actuator'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-flyway'
	implementation 'org.springframework.boot:spring-boot-starter-mail'
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.springframework.boot:spring-boot-starter-webmvc'
	implementation 'org.flywaydb:flyway-database-postgresql'

	// Allows to convert Entities to DTOs back and forth
	implementation 'org.modelmapper:modelmapper:3.2.6'

	// Allows to generate tokens for api authentication
	implementation 'io.jsonwebtoken:jjwt-api:0.13.0'
	runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.13.0'
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.13.0' // or 'io.jsonwebtoken:jjwt-gson:0.13.0' for gson

	// Source: https://mvnrepository.com/artifact/com.stripe/stripe-java
	implementation 'com.stripe:stripe-java:31.4.0'

	compileOnly 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-actuator-test'

	developmentOnly 'org.springframework.boot:spring-boot-docker-compose'

	runtimeOnly 'org.postgresql:postgresql'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-flyway-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-mail-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-security-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-validation-test'
	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
	testImplementation 'org.springframework.boot:spring-boot-testcontainers'
	testImplementation 'org.testcontainers:testcontainers-junit-jupiter'
	testImplementation 'org.testcontainers:testcontainers-postgresql'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}

// Helper to get the short Git commit hash
// Fixed Git Hash Function: Uses standard Groovy execution to avoid Gradle exec errors
def getGitHash = { ->
	try {
		def process = "git rev-parse --short HEAD".execute()
		process.waitFor()
		return process.text.trim()
	} catch (Exception e) {
		return "latest" // Fallback if git is not installed
	}
}

jib {
	from {
		// Use the official Eclipse Temurin JRE 25 image
		image = 'eclipse-temurin:25-jre-alpine' // Java 25 Runtime
		// Add this to support both Apple Silicon (arm64) and standard servers (amd64)
		platforms {
			platform {
				architecture = 'arm64'
				os = 'linux'
			}
//			platform {
//				architecture = 'amd64'
//				os = 'linux'
//			}
		}
	}
	to {
//		image = 'hotel-booking-app:latest'
		image = "caito25/${project.name.toLowerCase()}"
		tags = ['latest', getGitHash()]
//		tags = ['latest', "${project.version}"]
	}
	container {
		mainClass = 'com.capfer.hotel.booking.HotelBookingApplication'
		ports = ['9090']
		// JVM 25 optimizations for containers
		jvmFlags = ['-XX:+UseZGC', '-XX:+ZGenerational']
	}
}

flyway {
	url = "jdbc:postgresql://localhost:5432/hotel_bookings"
	user = "postgres"
	password = "secret2026"
	// Define where your migration scripts are located
//	locations = ['filesystem:src/main/resources/db/migration']
//	locations = ['classpath:db/migration'] // Default location for migration scripts
}

tasks.withType(JavaCompile) {
	options.compilerArgs += ["--enable-preview"]
}

tasks.withType(JavaExec) {
	jvmArgs += ["--enable-preview"]
}
