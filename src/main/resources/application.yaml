server:
  port: ${SERVER_PORT:9090} # Defaults to 9090 to match Jib/Compose
spring:
  application:
    name: HotelBooking

  # Postgres Connections
  datasource:
    # 'db' matches the service name in your docker-compose.yml
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hotel_bookings}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:secret2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # Options: none, validate, update, create, create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Ensure your app works with the health checks we set up earlier
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always


