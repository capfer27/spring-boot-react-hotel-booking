name: CI/CD Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      # STEP 1: RUN TESTS
      - name: Run Unit Tests
        run: ./gradlew test
        continue-on-error: false # Stop the workflow if tests fail

      # STEP 2: UPLOAD TESTS AND GENERATE AN HTML FILE REPORT
      - name: Upload Test Report
        if: always() # Upload reports even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: build/reports/tests/test/ # Default Gradle HTML report path
          retention-days: 5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # STEP 2: BUILD & PUSH (Only runs if tests pass)
      - name: Build and Push with Jib
        run: ./gradlew jib